name: Publish Images to Amazon ECR

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-ecr-main
  cancel-in-progress: false

env:
  BACKEND_ECR_REPOSITORY: barclays-banking-copilot-backend
  FRONTEND_ECR_REPOSITORY: barclays-banking-copilot-frontend

jobs:
  publish-images:
    name: Build and push ECR images
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Show GitHub OIDC claims
        shell: bash
        run: |
          TOKEN_RESPONSE=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.value')
          export TOKEN

          python - <<'PY'
          import base64
          import json
          import os

          token = os.environ["TOKEN"]
          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)

          claims = json.loads(
              base64.urlsafe_b64decode(payload).decode("utf-8")
          )

          print("issuer:", claims.get("iss"))
          print("audience:", claims.get("aud"))
          print("subject:", claims.get("sub"))
          print("repository:", claims.get("repository"))
          print("workflow:", claims.get("workflow"))
          print("ref:", claims.get("ref"))
          print("event:", claims.get("event_name"))
          PY

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-ecr-publish

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create image metadata
        id: image
        shell: bash
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHORT_SHA::12}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ steps.image.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=backend-ecr
          cache-to: type=gha,mode=max,scope=backend-ecr

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000/api/v1
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:${{ steps.image.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=frontend-ecr
          cache-to: type=gha,mode=max,scope=frontend-ecr
