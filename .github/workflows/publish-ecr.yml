name: Publish Images to Amazon ECR

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-ecr-main
  cancel-in-progress: false

env:
  BACKEND_ECR_REPOSITORY: barclays-banking-copilot-backend
  FRONTEND_ECR_REPOSITORY: barclays-banking-copilot-frontend

jobs:
  publish-images:
    name: Build and push ECR images
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-ecr-publish

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create image metadata
        id: image
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

          echo "Backend image:"
          echo "${{ steps.login-ecr.outputs.registry }}/${BACKEND_ECR_REPOSITORY}:${SHORT_SHA}"

          echo "Frontend image:"
          echo "${{ steps.login-ecr.outputs.registry }}/${FRONTEND_ECR_REPOSITORY}:${SHORT_SHA}"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ steps.image.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=backend-ecr
          cache-to: type=gha,mode=max,scope=backend-ecr

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000/api/v1
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:${{ steps.image.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=frontend-ecr
          cache-to: type=gha,mode=max,scope=frontend-ecr
